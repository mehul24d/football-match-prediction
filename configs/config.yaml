# ─────────────────────────────────────────────────────────────
# Football Match Prediction – Central Configuration (v2)
# ─────────────────────────────────────────────────────────────

project:
  name: "football-match-prediction"
  version: "2.0.0"
  random_seed: 42


# ── Data ──────────────────────────────────────────────────────
data:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  external_dir: "data/external"

  leagues:
    - name: "Premier League"
      code: "E0"
      country: "England"
    - name: "La Liga"
      code: "SP1"
      country: "Spain"
    - name: "Bundesliga"
      code: "D1"
      country: "Germany"
    - name: "Serie A"
      code: "I1"
      country: "Italy"
    - name: "Ligue 1"
      code: "F1"
      country: "France"

  seasons:
    - "2021-22"
    - "2022-23"
    - "2023-24"

  football_data_url: "https://www.football-data.co.uk/mmz4281/{season}/{code}.csv"


# ── Feature Engineering ───────────────────────────────────────
features:
  form_window: 5
  elo_k_factor: 32
  elo_initial_rating: 1500
  elo_home_advantage: 100

  # NEW 🔥
  time_decay_half_life: 30
  ewma_alpha: 0.5

  # Pressure system
  pressure:
    enabled: true
    season_weeks: 38
    default_value: 0.5

  # Rolling stats
  rolling_stats:
    - "goals_scored"
    - "goals_conceded"
    - "shots"
    - "shots_on_target"
    - "corners"
    - "fouls"

  target_column: "result"


# ── Models ────────────────────────────────────────────────────
models:
  output_dir: "models"
  test_size: 0.2
  cv_folds: 5

  stacking:
    n_splits: 5

  logistic_regression:
    C: 1.0
    max_iter: 1000
    solver: "lbfgs"

  random_forest:
    n_estimators: 200
    max_depth: 12
    n_jobs: -1

  xgboost:
    n_estimators: 300
    learning_rate: 0.05
    max_depth: 6
    subsample: 0.8
    colsample_bytree: 0.8
    eval_metric: "mlogloss"

  lightgbm:
    n_estimators: 300
    learning_rate: 0.05
    max_depth: 6
    num_leaves: 63
    subsample: 0.8
    colsample_bytree: 0.8
    verbosity: -1


# ── Calibration ───────────────────────────────────────────────
calibration:
  n_bins: 10
  enabled: true


# ── MLflow ────────────────────────────────────────────────────
mlflow:
  tracking_uri: "mlruns"
  experiment_name: "football-match-prediction"


# ── API ───────────────────────────────────────────────────────
api:
  host: "0.0.0.0"
  port: 8000
  reload: true
  football_data_api_key: "67c2c3da7a974c33b3ec923bbb98bdb8"
  model_path: "models/ensemble_model.joblib"
  scaler_path: "models/scaler.joblib"

  # NEW 🔥 Live standings integration
  standings:
    enabled: true
    api_url: "http://api.football-data.org/v4/competitions/PL/standings"
    timeout: 5


# ── Logging ───────────────────────────────────────────────────
logging:
  level: "INFO"
  format: "{time:YYYY-MM-DD HH:mm:ss} | {level} | {message}"
  log_dir: "logs"