# ─────────────────────────────────────────────────────────────
# Feature Engineering Configuration
# ─────────────────────────────────────────────────────────────

# ── Tier 1: Core Features ─────────────────────────────────────
core:
  elo:
    k_factor: 32
    initial_rating: 1500
    home_advantage: 100

  form:
    window: 5
    time_decay_half_life: 30  # days

  rolling_stats:
    window: 5
    columns:
      - goals_scored
      - goals_conceded
      - shots
      - shots_on_target
      - corners
      - fouls

# ── Tier 2: Advanced Features ─────────────────────────────────
advanced:
  opponent_adjusted:
    enabled: true
    window: 5

  tactical:
    enabled: true
    window: 5

  weighted_form:
    enabled: true
    window: 5
    alpha: 0.5   # EWMA decay factor

  home_away_splits:
    enabled: false  # enable when sufficient home/away data available

# ── Tier 3: Interaction Features ──────────────────────────────
interactions:
  enabled: true
  features:
    - attack_vs_defence        # home attack adj / away defence adj
    - pressure_form            # pressure_index × form
    - elo_pressure             # elo_diff × pressure differential

# ── Tier 4: Temporal Features ─────────────────────────────────
temporal:
  lag_features:
    enabled: true
    lags: [1, 2, 3]
    columns:
      - home_goals_scored_avg
      - home_goals_conceded_avg
      - home_form

  ewma:
    enabled: true
    span: 5
    columns:
      - home_goals_scored_avg
      - away_goals_scored_avg
      - home_form
      - away_form

  momentum:
    enabled: true
    window: 5

# ── Match Importance / Pressure Index ────────────────────────
match_importance:
  enabled: true
  season_weeks: 38
  thresholds:
    title_gap: 5
    top4_gap: 3
    relegation_gap: 3
    n_teams: 20
    top4_spots: 4
    relegation_spots: 3

  # Form multiplier — scales how much the live API "form" string
  # nudges the gap-based pressure score (range 0.0 → disabled, default 0.15)
  form_scale: 0.15

# ── Rolling Standings ─────────────────────────────────────────
rolling_standings:
  # Patch the latest week snapshot with live data from football-data.org
  patch_current_week: true

  # Which team name field from the API to use as the join key.
  # Must match the values in your home_team / away_team columns.
  #   "short_name"  → "Man City"            (recommended default)
  #   "name"        → "Manchester City FC"
  #   "tla"         → "MCI"
  team_name_col: "short_name"

  # API endpoint (override only if targeting a different competition)
  api_url: "https://api.football-data.org/v4/competitions/PL/standings"

  # HTTP timeout in seconds for the live standings request
  api_timeout: 10

  # Set to false in backtesting / evaluation to prevent live data leakage
  # (pipeline.py passes this automatically; set manually for custom scripts)
  # patch_current_week is overridden to false by rolling_backtest.py

# ── Feature Selection ─────────────────────────────────────────
selection:
  # Tier 1 — always present after base feature engineering
  core_features:
    - home_elo
    - away_elo
    - elo_diff
    - home_form
    - away_form
    - form_diff
    - home_form_decayed
    - away_form_decayed
    - home_goals_scored_avg
    - home_goals_conceded_avg
    - away_goals_scored_avg
    - away_goals_conceded_avg
    - home_shots_avg
    - away_shots_avg
    - home_shots_on_target_avg
    - away_shots_on_target_avg
    - home_corners_avg
    - away_corners_avg

  # Tier 2–4 — added when the relevant modules run successfully
  advanced_features:
    - home_attack_adj
    - away_attack_adj
    - home_defence_adj
    - away_defence_adj
    - home_conversion_rate
    - away_conversion_rate
    - home_form_ewma
    - away_form_ewma
    - home_win_streak
    - away_win_streak
    - pressure_index_home        # from match_importance + live standings
    - pressure_index_away
    - home_pressure_form         # pressure_index × form interaction
    - away_pressure_form
    - attack_vs_defence          # home_attack_adj / away_defence_adj
    - elo_pressure_interaction   # elo_diff × pressure differential